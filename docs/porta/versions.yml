# Version manifest for the b17s.Porta documentation.
#
# Each entry under `versions` maps a version id (which is also the name of the
# subfolder holding that version's docs, e.g. src/docs/porta/v2.0/) to a label
# shown in the docs version selector. `latest` decides where /docs/porta/
# redirects and which version supplies the library card on the docs overview.
#
# To add a new version: copy the latest version folder to a new <id>/ folder,
# update each page's content, set `base: /docs/porta/<id>/` in its docs-nav.yml,
# add an entry here, and (when ready) point `latest` at it.
library: b17s.Porta
latest: v0.4.0
versions:
  - id: v0.4.0
    label: "v0.4.0 (latest)"
  - id: v0.3.1-rc6
    label: "v0.3.1-rc6"
